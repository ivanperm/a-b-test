<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A/B-тест</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 60px auto;
      padding: 0 20px;
      line-height: 1.5;
    }

    h1 {
      margin-bottom: 16px;
    }

    p {
      margin-bottom: 24px;
      font-size: 18px;
    }

    .buttons {
      display: flex;
      gap: 12px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #debug {
      margin-top: 24px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1 id="title"></h1>
  <p id="description"></p>

  <div class="buttons">
    <button id="yesBtn">Хорошо</button>
    <button id="noBtn">Нет</button>
  </div>

  <div id="debug"></div>

  <script>
    // Вставьте сюда URL вашего Apps Script
    const api = "URL_APPS_SCRIPT";

    // Случайный выбор варианта при каждой загрузке
    const variant = Math.random() < 0.5 ? "A" : "B";

    const title = document.getElementById("title");
    const description = document.getElementById("description");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const debug = document.getElementById("debug");

    // Контент вариантов
    if (variant === "A") {
      title.textContent = "Запишитесь на курс";
      description.textContent = "Освойте основы медиаметрии и научитесь анализировать данные.";
    } else {
      title.textContent = "Попробуйте курс бесплатно";
      description.textContent = "Получите первое представление о медиаметрии и решите, подходит ли вам курс.";
    }

    debug.textContent = "Текущий вариант: " + variant;

    // Функция отправки события
    function sendEvent(eventName) {
      fetch(api, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
          variant: variant,
          event: eventName,
          page: window.location.href,
          userAgent: navigator.userAgent,
          time: new Date().toISOString()
        })
      })
      .then(response => response.text())
      .then(data => {
        console.log("Событие отправлено:", eventName, variant, data);
      })
      .catch(error => {
        console.error("Ошибка отправки:", error);
      });
    }

    // Можно учитывать показ страницы
    sendEvent("view");

    // Кнопка "Хорошо" — идет в статистику
    yesBtn.addEventListener("click", function () {
      sendEvent("good_click");
      alert("Спасибо! Ваш ответ учтен.");
    });

    // Кнопка "Нет" — просто перезагрузка страницы
    noBtn.addEventListener("click", function () {
      location.reload();
    });
  </script>
</body>
</html>
