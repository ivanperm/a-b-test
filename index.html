<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A/B-тест</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 60px auto;
      padding: 0 20px;
      line-height: 1.5;
    }

    h1 {
      margin-bottom: 16px;
    }

    p {
      margin-bottom: 24px;
      font-size: 18px;
    }

    .buttons {
      display: flex;
      gap: 12px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #debug {
      margin-top: 24px;
      color: #666;
      font-size: 14px;
    }

    #description {
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <h1 id="title"></h1>
  <p id="description"></p>

  <div class="buttons">
    <button id="yesBtn">Хорошо</button>
    <button id="noBtn">Нет</button>
  </div>

  <div id="debug"></div>

  <script>
    // Вставьте сюда URL вашего Apps Script
    const api = "https://script.google.com/macros/s/AKfycbymefRIQt-A3FP7TJ3xz1HXXzFJTg9lODnMFVWyXBN8NqFH9UzVeRjomZ_2wrhcZA8q/exec";

    // Случайный выбор варианта при каждой загрузке
    const variant = Math.random() < 0.5 ? "A" : "B";

    const title = document.getElementById("title");
    const description = document.getElementById("description");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const debug = document.getElementById("debug");

// Контент вариантов
if (variant === "A") {
  title.textContent = "Продаётся двухкомнатная квартира 54 м²";

  description.textContent = `Квартира расположена на 6 этаже 10-этажного дома.
Общая площадь — 54 м², кухня — 11 м², комнаты изолированные.

В квартире сделан косметический ремонт, установлены пластиковые окна, есть застеклённый балкон.

Дом расположен в районе с развитой инфраструктурой: рядом школа, детский сад, магазины и остановка транспорта.

Подходит для семьи или сдачи в аренду.`;

} else {

  title.textContent = "Уютная квартира, в которую хочется возвращаться";

  description.textContent = `Светлая двухкомнатная квартира площадью 54 м² на 6 этаже современного дома.

Большая кухня (11 м²) подойдёт для семейных ужинов и встреч с друзьями.

Квартира аккуратная и светлая, с застеклённым балконом.

Во дворе тихо и зелено, рядом школа, детский сад и магазины — всё, что нужно для комфортной жизни.

Отличный вариант для семьи или как инвестиция под аренду.`;
}

    debug.textContent = "Текущий вариант: " + variant;

    // Функция отправки события
    function sendEvent(eventName) {
      fetch(api, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
          variant: variant,
          event: eventName,
          page: window.location.href,
          userAgent: navigator.userAgent,
          time: new Date().toISOString()
        })
      })
      .then(response => response.text())
      .then(data => {
        console.log("Событие отправлено:", eventName, variant, data);
      })
      .catch(error => {
        console.error("Ошибка отправки:", error);
      });
    }

    // Можно учитывать показ страницы
    sendEvent("view");

    // Кнопка "Хорошо" — идет в статистику
    yesBtn.addEventListener("click", function () {
      sendEvent("good_click");
      alert("Спасибо! Ваш ответ учтен.");
    });

    // Кнопка "Нет" — просто перезагрузка страницы
    noBtn.addEventListener("click", function () {
      location.reload();
    });
  </script>
</body>
</html>
